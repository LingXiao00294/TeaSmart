# TeaSmart 部署在 /teasmart/ 子路径下；前端 base、router、axios baseURL 同源（见 vite.config.js）。
# 后端不感知该前缀（context-path 为空），由 nginx/vite-dev-proxy 在转发时剥离。
server {
    listen 80;
    server_name _;

    # 无末尾斜杠 → 重定向到带斜杠，否则 SPA location 匹配不到
    location = /teasmart {
        return 301 /teasmart/;
    }

    # SSE 聊天接口 - 关闭缓冲
    location /teasmart/api/ai/chat {
        proxy_pass http://backend:8080/api/ai/chat;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # API 代理
    location /teasmart/api/ {
        client_max_body_size 5m;
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 上传文件代理
    location /teasmart/uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 前端 SPA
    location /teasmart/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /teasmart/index.html;
    }
}
