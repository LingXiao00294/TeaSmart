server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/teasmart
    username: teasmart
    password: teasmart
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true

app:
  # 部署子路径前缀，用于拼接对外暴露的 URL（如上传文件路径）。后端本身监听根路径，由反向代理剥离该前缀。
  base-path: ${APP_BASE_PATH:/teasmart}

jwt:
  secret: ${JWT_SECRET:teasmart-default-secret-key-at-least-32-chars-long!!}
  expiration: 86400000  # 24小时

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      insert-strategy: not_null
